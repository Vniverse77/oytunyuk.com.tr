            // ─── LANGUAGE ENGINE ──────────────────────────────────────────────────
            let currentLang = "tr";

            function getNestedVal(obj, path) {
                return path
                    .split(".")
                    .reduce(
                        (o, k) => (o && o[k] !== undefined ? o[k] : null),
                        obj,
                    );
            }

            function buildFaq(lang) {
                const items = T[lang]?.faq?.items;
                if (!items) return;
                const list = document.getElementById("faqList");
                list.innerHTML = items
                    .map(
                        (item, i) => `
                <div class="faq-item" id="faq-${i}">
                    <button class="faq-q" onclick="toggleFaq(${i})">
                        <span>${item.q}</span>
                        <svg class="faq-icon" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <div class="faq-a" id="faq-a-${i}"><p>${item.a}</p></div>
                </div>
            `,
                    )
                    .join("");
            }

            function applyTranslations(lang) {
                const t = T[lang];
                if (!t) return;
                currentLang = lang;

                const html = document.getElementById("app");
                html.lang = lang;
                html.dir = lang === "ar" ? "rtl" : "ltr";

                document.querySelectorAll("[data-i18n]").forEach((el) => {
                    const val = getNestedVal(t, el.dataset.i18n);
                    if (val !== null) el.textContent = val;
                });
                document.querySelectorAll("[data-i18n-html]").forEach((el) => {
                    const val = getNestedVal(t, el.dataset.i18nHtml);
                    if (val !== null) el.innerHTML = val;
                });
                document
                    .querySelectorAll("[data-i18n-placeholder]")
                    .forEach((el) => {
                        const val = getNestedVal(t, el.dataset.i18nPlaceholder);
                        if (val !== null) el.placeholder = val;
                    });
                document.querySelectorAll(".lang-btn").forEach((btn) => {
                    btn.classList.toggle(
                        "active",
                        btn.textContent.trim().toLowerCase() === lang,
                    );
                });

                // Rebuild FAQ for new language
                buildFaq(lang);

                localStorage.setItem("preferred_lang", lang);
            }

            function setLang(lang) {
                applyTranslations(lang);
            }

            // ─── FAQ ACCORDION ────────────────────────────────────────────────────
            function toggleFaq(index) {
                const answer = document.getElementById(`faq-a-${index}`);
                const item = document.getElementById(`faq-${index}`);
                const isOpen = item.classList.contains("open");

                // Close all
                document
                    .querySelectorAll(".faq-item")
                    .forEach((el) => el.classList.remove("open"));
                document
                    .querySelectorAll(".faq-a")
                    .forEach((el) => (el.style.maxHeight = null));

                if (!isOpen) {
                    item.classList.add("open");
                    answer.style.maxHeight = answer.scrollHeight + "px";
                }
            }

            // ─── MOBILE MENU ──────────────────────────────────────────────────────
            function toggleMenu() {
                const menu = document.getElementById("mobileMenu");
                const btn = document.getElementById("hamburger");
                menu.classList.toggle("open");
                btn.classList.toggle("open");
            }

            // ─── FORM SUBMIT (UI feedback, backend hazır olunca bağlanacak) ───────
            function handleFormSubmit(e) {
                e.preventDefault();
                const btn = document.getElementById("submitBtn");
                const success = document.getElementById("formSuccess");
                btn.disabled = true;
                btn.style.opacity = "0.6";
                setTimeout(() => {
                    success.classList.add("visible");
                    btn.disabled = false;
                    btn.style.opacity = "1";
                    e.target.reset();
                }, 800);
            }

            // ─── GEOLOCATION → LANGUAGE ───────────────────────────────────────────
            const ARABIC_COUNTRIES = new Set([
                "SA",
                "AE",
                "EG",
                "IQ",
                "SY",
                "JO",
                "LB",
                "KW",
                "QA",
                "BH",
                "OM",
                "YE",
                "LY",
                "TN",
                "DZ",
                "MA",
                "SD",
                "SO",
                "MR",
                "DJ",
                "KM",
                "PS",
            ]);

            async function detectLanguage() {
                const saved = localStorage.getItem("preferred_lang");
                if (saved && T[saved]) {
                    applyTranslations(saved);
                    return;
                }
                try {
                    // Production'da Cloudflare CF-IPCountry header'ı kullanılacak (backend'den)
                    const resp = await fetch("https://ipapi.co/json/", {
                        signal: AbortSignal.timeout(3500),
                    });
                    const data = await resp.json();
                    const cc = (data.country_code || "").toUpperCase();
                    if (cc === "TR") applyTranslations("tr");
                    else if (ARABIC_COUNTRIES.has(cc)) applyTranslations("ar");
                    else applyTranslations("en");
                } catch {
                    const bl = (navigator.language || "tr")
                        .slice(0, 2)
                        .toLowerCase();
                    if (bl === "tr") applyTranslations("tr");
                    else if (bl === "ar") applyTranslations("ar");
                    else applyTranslations("en");
                }
            }

            // ─── SCROLL ANIMATIONS ────────────────────────────────────────────────
            const observer = new IntersectionObserver(
                (entries) =>
                    entries.forEach((e) => {
                        if (e.isIntersecting) {
                            e.target.classList.add("visible");
                            observer.unobserve(e.target);
                        }
                    }),
                { threshold: 0.08, rootMargin: "0px 0px -40px 0px" },
            );

            // ─── INIT ─────────────────────────────────────────────────────────────
            document.addEventListener("DOMContentLoaded", async () => {
                applyTranslations("tr");
                await detectLanguage();

                const loader = document.getElementById("lang-loader");
                loader.classList.add("hidden");
                setTimeout(() => loader.remove(), 500);

                document.querySelectorAll(".hero .fade-up").forEach((el, i) => {
                    setTimeout(() => el.classList.add("visible"), 80 + i * 120);
                });
                document
                    .querySelectorAll(".fade-up:not(.visible)")
                    .forEach((el) => observer.observe(el));
            });
        </script>
    </body>
